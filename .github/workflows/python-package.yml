name: Build and test py-lmdb

on:
  push:
    branches: [master, release]
    tags:
      - 'py-lmdb_*'
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test ${{ matrix.os }} (py${{ matrix.python-version }}, ${{ matrix.impl }}, ${{ matrix.purity }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - all Python versions, both impls, patched
          - {os: ubuntu-24.04, python-version: '3.11', impl: cpython, purity: patched}
          - {os: ubuntu-24.04, python-version: '3.13', impl: cpython, purity: patched}
          - {os: ubuntu-24.04, python-version: '3.14', impl: cpython, purity: patched}
          - {os: ubuntu-24.04, python-version: '3.11', impl: cffi, purity: patched}
          - {os: ubuntu-24.04, python-version: '3.13', impl: cffi, purity: patched}
          - {os: ubuntu-24.04, python-version: '3.14', impl: cffi, purity: patched}
          # Linux - pure variant on latest Python only
          - {os: ubuntu-24.04, python-version: '3.14', impl: cpython, purity: pure}
          - {os: ubuntu-24.04, python-version: '3.14', impl: cffi, purity: pure}
          # Windows - newest + one older, both impls
          - {os: windows-latest, python-version: '3.11', impl: cpython, purity: patched}
          - {os: windows-latest, python-version: '3.14', impl: cpython, purity: patched}
          - {os: windows-latest, python-version: '3.14', impl: cffi, purity: patched}
          # macOS - newest + one older, both impls
          - {os: macos-latest, python-version: '3.11', impl: cpython, purity: patched}
          - {os: macos-latest, python-version: '3.14', impl: cpython, purity: patched}
          - {os: macos-latest, python-version: '3.14', impl: cffi, purity: patched}
          # PyPy
          - {os: ubuntu-24.04, python-version: 'pypy-3.10', impl: cffi, purity: patched}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set env vars
      shell: bash
      run: |
        if [[ "${{ matrix.impl }}" == "cpython" ]]; then
          echo "LMDB_FORCE_CPYTHON=1" >> $GITHUB_ENV
        else
          echo "LMDB_FORCE_CFFI=1" >> $GITHUB_ENV
        fi
        if [[ "${{ matrix.purity }}" == "pure" ]]; then
          echo "LMDB_PURE=1" >> $GITHUB_ENV
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest cffi patch-ng setuptools
        python setup.py develop

    - name: Test with pytest
      run: pytest

  test-full:
    name: Test ${{ matrix.os }} (py${{ matrix.python-version }}, ${{ matrix.impl }}, ${{ matrix.purity }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-latest]
        python-version: ['3.11', '3.13', '3.14']
        impl: [cpython, cffi]
        purity: [patched, pure]
        include:
          - os: ubuntu-24.04
            python-version: 'pypy-3.10'
            impl: 'cffi'
            purity: 'patched'

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set env vars
      shell: bash
      run: |
        if [[ "${{ matrix.impl }}" == "cpython" ]]; then
          echo "LMDB_FORCE_CPYTHON=1" >> $GITHUB_ENV
        else
          echo "LMDB_FORCE_CFFI=1" >> $GITHUB_ENV
        fi
        if [[ "${{ matrix.purity }}" == "pure" ]]; then
          echo "LMDB_PURE=1" >> $GITHUB_ENV
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest cffi patch-ng setuptools
        python setup.py develop

    - name: Test with pytest
      run: pytest

  test-mdb-layout:
    name: MDB layout tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-24.04, python-version: '3.14'}
          - {os: macos-latest, python-version: '3.14'}
          - {os: windows-latest, python-version: '3.14'}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest cffi patch-ng setuptools
        python setup.py develop
      env:
        LMDB_FORCE_CPYTHON: 1

    - name: Run MDB layout tests
      run: pytest -m mdb_layout -v

  equiv-check:
    name: Patched vs Pure equivalence (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-24.04, python-version: '3.14'}
          - {os: macos-latest, python-version: '3.14'}
          - {os: windows-latest, python-version: '3.14'}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cffi patch-ng setuptools

    - name: Build patched and create databases
      shell: bash
      run: |
        LMDB_FORCE_CPYTHON=1 python setup.py develop
        python tests/equiv_dump.py create "$RUNNER_TEMP/equiv-patched-db" > "$RUNNER_TEMP/patched-create.txt"

    - name: Rebuild pure and cross-read patched databases
      shell: bash
      run: |
        python -c "
        import glob, os, shutil
        shutil.rmtree('build', ignore_errors=True)
        for pat in ['lmdb/*.so', 'lmdb/*.pyd', 'lmdb/*.dll']:
            for f in glob.glob(pat): os.remove(f)
        "
        LMDB_FORCE_CPYTHON=1 LMDB_PURE=1 python setup.py develop
        python tests/equiv_dump.py read "$RUNNER_TEMP/equiv-patched-db" > "$RUNNER_TEMP/pure-read-patched.txt"
        python tests/equiv_dump.py create "$RUNNER_TEMP/equiv-pure-db" > "$RUNNER_TEMP/pure-create.txt"

    - name: Compare outputs
      shell: bash
      run: |
        echo "=== Behavioral equivalence: patched-create vs pure-create ==="
        diff "$RUNNER_TEMP/patched-create.txt" "$RUNNER_TEMP/pure-create.txt" && echo "PASS" || { echo "FAIL"; exit 1; }
        echo ""
        echo "=== Forward compatibility: patched-create vs pure-read-patched ==="
        diff "$RUNNER_TEMP/patched-create.txt" "$RUNNER_TEMP/pure-read-patched.txt" && echo "PASS" || { echo "FAIL"; exit 1; }

    - name: Upload dump artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: equiv-dumps-${{ matrix.os }}
        path: |
          ${{ runner.temp }}/patched-create.txt
          ${{ runner.temp }}/pure-create.txt
          ${{ runner.temp }}/pure-read-patched.txt

  build_cpython_wheels:
    name: Build CPython wheels on ${{ matrix.os }}
    if: github.event_name == 'push'
    needs: [test, test-full]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*-musllinux_*"
          LMDB_FORCE_CPYTHON: 1
          CIBW_TEST_COMMAND: ""

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_pypy_wheel:
    name: Build PyPy wheel
    if: github.event_name == 'push'
    needs: [test, test-full]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Set up PyPy
        uses: actions/setup-python@v6
        with:
          python-version: 'pypy-3.10'

      - name: Build PyPy CFFI wheel
        run: |
          pip install wheel cffi
          export LMDB_FORCE_CFFI=1
          pip wheel . -w raw-dist --no-deps

      - name: Set up CPython for auditwheel
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Repair wheel with auditwheel
        run: |
          pip install auditwheel patchelf
          auditwheel repair raw-dist/*.whl -w dist

      - name: Upload PyPy wheel
        uses: actions/upload-artifact@v4
        with:
          name: pypy-wheel
          path: dist/*.whl

  publish-to-test-pypi:
    name: Publish wheels to Test PyPI
    permissions:
      id-token: write
    needs: [build_cpython_wheels, build_pypy_wheel]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install setuptools
          python setup.py sdist

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-wheels-*
          merge-multiple: true

      - name: Download PyPy wheel
        uses: actions/download-artifact@v4
        with:
          name: pypy-wheel
          path: dist

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish:
    name: Publish wheels
    permissions:
      id-token: write
    needs: [build_cpython_wheels, build_pypy_wheel]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags')

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install setuptools
          python setup.py sdist

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cibw-wheels-*
          merge-multiple: true

      - name: Download PyPy wheel
        uses: actions/download-artifact@v4
        with:
          name: pypy-wheel
          path: dist

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
