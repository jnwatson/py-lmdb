# TEMPORARY debugging workflow for issue #465 (aarch64 segfault).
# Captures a symbolized gdb backtrace of the crash on a native ARM
# runner and pushes a COMPACT artifact to a side branch
# (claude/465-logs-<purity>) so it can be read via the GitHub API
# without wading through full Actions logs. Delete before merging PR #466.
name: aarch64 crash debug (issue #465)

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  aarch64-gdb:
    name: aarch64 backtrace (${{ matrix.purity }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        # 'patched' = bundled LMDB + py-lmdb patches; 'pure' = bundled
        # LMDB source with NO py-lmdb patches.
        purity: [patched, pure]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies (with debug symbols)
        env:
          LMDB_FORCE_CPYTHON: 1
          CFLAGS: "-g -O0 -fno-omit-frame-pointer"
        run: |
          python -m pip install --upgrade pip
          pip install pytest cffi patch-ng setuptools
          sudo apt-get update && sudo apt-get install -y gdb
          if [ "${{ matrix.purity }}" = "pure" ]; then
            export LMDB_PURE=1
          fi
          python setup.py develop

      - name: Capture crash backtrace under gdb
        run: |
          set -x
          # gdb 'logging redirect on' sends gdb's OWN output (stop reason,
          # backtraces) to the log file, while the inferior's stdout/stderr
          # (pytest's voluminous output) goes to out.txt. This isolates the
          # backtrace from the noise.
          run_gdb () {
            local logf="$1"; shift
            local outf="$1"; shift
            gdb -q -batch \
              -ex 'set pagination off' \
              -ex "set logging file $logf" \
              -ex 'set logging overwrite on' \
              -ex 'set logging redirect on' \
              -ex 'set logging on' \
              -ex 'run' \
              -ex 'echo \n===== bt full =====\n' \
              -ex 'bt full' \
              -ex 'echo \n===== thread apply all bt =====\n' \
              -ex 'thread apply all bt' \
              -ex 'set logging off' \
              --args "$@" > "$outf" 2>&1 || true
          }
          run_gdb /tmp/bt_suite.txt /tmp/out_suite.txt \
            python -m pytest tests/ -q -p no:cacheprovider

          ART=465-backtrace-${{ matrix.purity }}.txt
          {
            echo "############################################################"
            echo "# issue #465 aarch64 backtrace  --  purity=${{ matrix.purity }}"
            echo "############################################################"
            echo "## SYSTEM"
            uname -a; echo "PAGE_SIZE=$(getconf PAGE_SIZE)"
            ldd --version | head -1
            python -c "import lmdb,sys; print('lmdb',lmdb.__version__,'libversion',lmdb.version())"
            echo
            echo "## FULL SUITE -- GDB BACKTRACE (gdb's own output)"
            cat /tmp/bt_suite.txt 2>/dev/null || echo "(no gdb log)"
            echo
            echo "## FULL SUITE -- PROGRAM OUTPUT TAIL (last test + faulthandler)"
            tail -150 /tmp/out_suite.txt 2>/dev/null || echo "(no program output)"
          } > "$ART"
          echo "----- artifact preview -----"
          head -80 "$ART"

      - name: Push backtrace artifact to side branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ART=465-backtrace-${{ matrix.purity }}.txt
          cp "$ART" /tmp/backtrace.txt
          # Orphan branch containing ONLY the backtrace file.
          git checkout --orphan logs-${{ matrix.purity }}
          git reset            # unstage everything; working tree untouched
          cp /tmp/backtrace.txt backtrace.txt
          git add -f backtrace.txt
          git commit -m "debug #465 backtrace (${{ matrix.purity }})"
          git push -f origin HEAD:claude/465-logs-${{ matrix.purity }}
