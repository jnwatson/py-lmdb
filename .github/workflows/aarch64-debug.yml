# TEMPORARY debugging workflow for issue #465 (aarch64 segfault).
# Captures a symbolized gdb backtrace of the crash on a native ARM
# runner and pushes a COMPACT artifact to a side branch
# (claude/465-logs-<purity>) so it can be read via the GitHub API
# without wading through full Actions logs. Delete before merging PR #466.
name: aarch64 crash debug (issue #465)

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  aarch64-gdb:
    name: aarch64 backtrace (${{ matrix.purity }})
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        # 'patched' = bundled LMDB + py-lmdb patches; 'pure' = bundled
        # LMDB source with NO py-lmdb patches.
        purity: [patched, pure]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies (with debug symbols)
        env:
          LMDB_FORCE_CPYTHON: 1
          CFLAGS: "-g -O0 -fno-omit-frame-pointer"
        run: |
          python -m pip install --upgrade pip
          pip install pytest cffi patch-ng setuptools
          sudo apt-get update && sudo apt-get install -y gdb
          if [ "${{ matrix.purity }}" = "pure" ]; then
            export LMDB_PURE=1
          fi
          python setup.py develop

      - name: Capture crash backtrace under gdb
        run: |
          set -x
          # gdb 'logging redirect on' sends gdb's OWN output (stop reason,
          # backtraces) to the log file, while the inferior's stdout/stderr
          # (pytest's voluminous output) goes to out.txt. This isolates the
          # backtrace from the noise.
          run_gdb () {
            local logf="$1"; shift
            local outf="$1"; shift
            gdb -q -batch \
              -ex 'set pagination off' \
              -ex "set logging file $logf" \
              -ex 'set logging overwrite on' \
              -ex 'set logging redirect on' \
              -ex 'set logging on' \
              -ex 'run' \
              -ex 'echo \n===== bt full =====\n' \
              -ex 'bt full' \
              -ex 'echo \n===== thread apply all bt =====\n' \
              -ex 'thread apply all bt' \
              -ex 'set logging off' \
              --args "$@" > "$outf" 2>&1 || true
          }
          run_gdb /tmp/bt_suite.txt /tmp/out_suite.txt \
            python -m pytest tests/ -q -p no:cacheprovider

          ART=465-backtrace-${{ matrix.purity }}.txt
          {
            echo "############################################################"
            echo "# issue #465 aarch64 backtrace  --  purity=${{ matrix.purity }}"
            echo "############################################################"
            echo "## SYSTEM"
            uname -a; echo "PAGE_SIZE=$(getconf PAGE_SIZE)"
            ldd --version | head -1
            python -c "import lmdb,sys; print('lmdb',lmdb.__version__,'libversion',lmdb.version())"
            echo
            echo "## FULL SUITE -- GDB BACKTRACE (gdb's own output)"
            cat /tmp/bt_suite.txt 2>/dev/null || echo "(no gdb log)"
            echo
            echo "## FULL SUITE -- PROGRAM OUTPUT TAIL (last test + faulthandler)"
            tail -150 /tmp/out_suite.txt 2>/dev/null || echo "(no program output)"
          } > "$ART"
          echo "----- artifact preview -----"
          head -80 "$ART"

      - name: Push backtrace artifact to side branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ART=465-backtrace-${{ matrix.purity }}.txt
          cp "$ART" /tmp/backtrace.txt
          # Orphan branch containing ONLY the backtrace file.
          git checkout --orphan logs-${{ matrix.purity }}
          git reset            # unstage everything; working tree untouched
          cp /tmp/backtrace.txt backtrace.txt
          git add -f backtrace.txt
          git commit -m "debug #465 backtrace (${{ matrix.purity }})"
          git push -f origin HEAD:claude/465-logs-${{ matrix.purity }}

  # Detector: find any munmap() that frees a region still containing a
  # locked (robust) mutex -- i.e. the exact lifecycle bug behind #465 --
  # and capture the culprit LMDB call site. Result pushed to a side branch.
  aarch64-robust-detector:
    name: aarch64 robust-list detector
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build (robust ON, debug symbols)
        env:
          LMDB_FORCE_CPYTHON: 1
          CFLAGS: "-g -O0 -fno-omit-frame-pointer"
        run: |
          python -m pip install --upgrade pip
          pip install pytest cffi patch-ng setuptools
          python setup.py develop
      - name: Build detector shim
        run: |
          cat > /tmp/rdetect.c <<'EOF'
          #define _GNU_SOURCE
          #include <dlfcn.h>
          #include <stdio.h>
          #include <stdint.h>
          #include <pthread.h>
          #include <execinfo.h>
          #define N 8192
          static volatile uintptr_t slot[N]; static pid_t tids[N]; static volatile int lk;
          static void L(void){while(__atomic_exchange_n(&lk,1,__ATOMIC_ACQUIRE));}
          static void U(void){__atomic_store_n(&lk,0,__ATOMIC_RELEASE);}
          static void add(void*p){uintptr_t v=(uintptr_t)p;L();for(int i=0;i<N;i++){int j=(v/64+i)%N;if(!slot[j]){slot[j]=v;tids[j]=(pid_t)pthread_self();break;}}U();}
          static void del(void*p){uintptr_t v=(uintptr_t)p;L();for(int i=0;i<N;i++){int j=(v/64+i)%N;if(slot[j]==v){slot[j]=0;break;}}U();}
          static int(*r_lock)(pthread_mutex_t*),(*r_try)(pthread_mutex_t*),(*r_un)(pthread_mutex_t*),(*r_mu)(void*,size_t);
          __attribute__((constructor)) static void init(void){r_lock=dlsym(RTLD_NEXT,"pthread_mutex_lock");r_try=dlsym(RTLD_NEXT,"pthread_mutex_trylock");r_un=dlsym(RTLD_NEXT,"pthread_mutex_unlock");r_mu=dlsym(RTLD_NEXT,"munmap");}
          int pthread_mutex_lock(pthread_mutex_t*m){int rc=r_lock(m);if(rc==0||rc==130)add(m);return rc;}
          int pthread_mutex_trylock(pthread_mutex_t*m){int rc=r_try(m);if(rc==0||rc==130)add(m);return rc;}
          int pthread_mutex_unlock(pthread_mutex_t*m){del(m);return r_un(m);}
          int munmap(void*a,size_t n){uintptr_t lo=(uintptr_t)a,hi=lo+n;L();for(int i=0;i<N;i++){if(slot[i]&&slot[i]>=lo&&slot[i]<hi){U();fprintf(stderr,"\n*** HELD-MUTEX-UNMAP: munmap(%p,%zu) frees locked mutex %p tid=%d ***\n",a,n,(void*)slot[i],(int)tids[i]);void*bt[40];int k=backtrace(bt,40);backtrace_symbols_fd(bt,k,2);fprintf(stderr,"*** end ***\n");L();}}U();return r_mu(a,n);}
          EOF
          gcc -O0 -g -shared -fPIC /tmp/rdetect.c -o /tmp/rdetect.so -ldl
      - name: Run suite under detector
        run: |
          LD_PRELOAD=/tmp/rdetect.so pytest tests/ -q -p no:cacheprovider \
            > /tmp/det_stdout.txt 2> /tmp/det_stderr.txt || true
          {
            echo "## detections:"; grep -c "HELD-MUTEX-UNMAP" /tmp/det_stderr.txt || true
            echo "## first detections + backtraces:"
            grep -A24 "HELD-MUTEX-UNMAP" /tmp/det_stderr.txt | head -120
            echo "## pytest tail:"; tail -15 /tmp/det_stdout.txt
          } > /tmp/detector.txt
          cat /tmp/detector.txt
      - name: Push detector result to side branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp /tmp/detector.txt /tmp/keep.txt
          git checkout --orphan logs-detector
          git reset
          cp /tmp/keep.txt detector.txt
          git add -f detector.txt
          git commit -m "debug #465 robust-list detector output"
          git push -f origin HEAD:claude/465-logs-detector

  # Blame test: walk the thread's ACTUAL kernel robust list before every
  # lock and flag any entry whose memory is unmapped. x86_64 shows ZERO
  # such entries across the suite (robust list stays clean after LMDB's
  # balanced unlock+munmap). If aarch64 shows a dangling entry, the
  # defect is in aarch64 glibc's robust-mutex bookkeeping, not LMDB.
  aarch64-robust-walker:
    name: aarch64 robust-list walker
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Build (robust ON, debug)
        env: { LMDB_FORCE_CPYTHON: '1', CFLAGS: '-g -O0 -fno-omit-frame-pointer' }
        run: |
          python -m pip install --upgrade pip
          pip install pytest cffi patch-ng setuptools
          # Build the unpatched-on-aarch64 way: temporarily drop our fix so
          # robust mutexes are ON, to observe the native glibc behaviour.
          sed -i '/disable-robust-mutex-aarch64/d' setup.py
          python setup.py develop
      - name: Build walker shim
        run: |
          cat > /tmp/rwalk.c <<'EOF'
          #define _GNU_SOURCE
          #include <dlfcn.h>
          #include <stdio.h>
          #include <stdint.h>
          #include <errno.h>
          #include <sys/mman.h>
          #include <sys/syscall.h>
          #include <execinfo.h>
          #include <pthread.h>
          struct rl{struct rl*next;}; struct rlh{struct rl*list;long off;struct rl*pending;};
          static __thread int guard; static int(*r_lock)(pthread_mutex_t*); static long nd=0;
          __attribute__((constructor)) static void init(void){r_lock=dlsym(RTLD_NEXT,"pthread_mutex_lock");}
          static int unmapped(void*p){uintptr_t pg=(uintptr_t)p&~(uintptr_t)4095;unsigned char v;return mincore((void*)pg,1,&v)==-1&&errno==ENOMEM;}
          static void check(void){struct rlh*h=0;size_t l=0;if(syscall(SYS_get_robust_list,0,&h,&l)||!h)return;struct rl*c=h->list;int n=0;
            while(c&&c!=(struct rl*)h&&n++<2000){if(unmapped(c)){if(++nd<=6){fprintf(stderr,"\n*** DANGLING ROBUST-LIST ENTRY %p — UNMAPPED ***\n",(void*)c);void*bt[30];int k=backtrace(bt,30);backtrace_symbols_fd(bt,k,2);}return;}c=c->next;}}
          int pthread_mutex_lock(pthread_mutex_t*m){if(!guard){guard=1;check();guard=0;}return r_lock(m);}
          EOF
          gcc -O0 -g -shared -fPIC /tmp/rwalk.c -o /tmp/rwalk.so -ldl
      - name: Run suite under walker
        run: |
          LD_PRELOAD=/tmp/rwalk.so pytest tests/ -q -p no:cacheprovider \
            >/tmp/w.out 2>/tmp/w.err || true
          {
            echo "## dangling count:"; grep -c "DANGLING ROBUST-LIST" /tmp/w.err || true
            echo "## first dangling entries + backtraces:"
            grep -A8 "DANGLING ROBUST-LIST" /tmp/w.err | head -80
            echo "## pytest tail:"; tail -8 /tmp/w.out
          } > /tmp/walker.txt
          cat /tmp/walker.txt
      - name: Push walker result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp /tmp/walker.txt /tmp/keep.txt
          git checkout --orphan logs-walker
          git reset
          cp /tmp/keep.txt walker.txt
          git add -f walker.txt
          git commit -m "debug #465 robust-list walker (robust ON)"
          git push -f origin HEAD:claude/465-logs-walker

  # Deep dump: decode the mutex __data (lock/owner/kind/list ptrs), the
  # fault address, faulting instruction, and robust-list chain at the
  # crash, with glibc debug symbols for exact source lines. This pins the
  # precise glibc mechanism (glibc defect vs. bad mutex state from LMDB).
  aarch64-gdb-dump:
    name: aarch64 gdb deep dump
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with: { python-version: '3.11' }
      - name: Install gdb + glibc debug symbols
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb libc6-dbg
      - name: Build robust ON, debug
        env: { LMDB_FORCE_CPYTHON: '1', CFLAGS: '-g -O0 -fno-omit-frame-pointer' }
        run: |
          python -m pip install --upgrade pip
          pip install pytest cffi patch-ng setuptools
          sed -i '/disable-robust-mutex-aarch64/d' setup.py   # robust ON
          python setup.py develop
      - name: Crash + deep dump under gdb
        run: |
          cat > /tmp/cmds.gdb <<'EOF'
          set pagination off
          set print pretty on
          set logging file /tmp/dump.txt
          set logging overwrite on
          set logging redirect on
          set logging enabled on
          run
          echo \n===== FAULT =====\n
          printf "pc=%#lx\n", $pc
          x/3i $pc
          printf "si_addr=%p\n", $_siginfo._sifields._sigfault.si_addr
          echo \n===== REGISTERS =====\n
          info registers
          echo \n===== FRAME 0 (glibc) =====\n
          frame 0
          info locals
          list
          echo \n===== MUTEX __data (raw doublewords) =====\n
          frame 1
          printf "rmutex=%p ti=%p\n", rmutex, ti
          echo word0=__lock|__count word1=__owner|__nusers word2=__kind|__spins word3=__list.__next word4=__list.__prev\n
          x/5gx rmutex
          echo \n===== robust_head.list (frame0 next) and its chain =====\n
          frame 0
          printf "next=%p\n", next
          x/2gx next
          echo \n===== BACKTRACE =====\n
          bt
          set logging enabled off
          EOF
          gdb -q -batch -x /tmp/cmds.gdb \
            --args python -m pytest tests/ -q -p no:cacheprovider \
            >/dev/null 2>&1 || true
          echo "## glibc:"; ldd --version | head -1 > /tmp/out.txt
          cat /tmp/dump.txt >> /tmp/out.txt 2>/dev/null || echo "(no dump)" >> /tmp/out.txt
          cat /tmp/out.txt
      - name: Push dump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp /tmp/out.txt /tmp/keep.txt
          git checkout --orphan logs-gdbdump
          git reset
          cp /tmp/keep.txt gdbdump.txt
          git add -f gdbdump.txt
          git commit -m "debug #465 gdb deep dump"
          git push -f origin HEAD:claude/465-logs-gdbdump

  # Fix hypothesis: the crash is glibc's robust process-shared mutex
  # walking a dangling robust-list entry left by a munmap'd lock file.
  # Building liblmdb with MDB_USE_ROBUST=0 removes the robust machinery.
  # If this job goes GREEN, the root cause and fix are confirmed.
  aarch64-robust0-fix-check:
    name: aarch64 fix check (MDB_USE_ROBUST=0)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build with MDB_USE_ROBUST=0
        env:
          LMDB_FORCE_CPYTHON: 1
          CFLAGS: "-DMDB_USE_ROBUST=0"
        run: |
          python -m pip install --upgrade pip
          pip install pytest cffi patch-ng setuptools
          python setup.py develop
      - name: Run full suite (real pass/fail)
        run: pytest tests/ -q
